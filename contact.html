/* หิมะ */

.snow{
position:fixed;
top:-10%;
font-size:24px;
pointer-events:none;
animation:fall linear infinite;
opacity:.9;
}

.s1{left:5%;animation-duration:8s;}
.s2{left:20%;animation-duration:10s;}
.s3{left:35%;animation-duration:7s;}
.s4{left:50%;animation-duration:9s;}
.s5{left:65%;animation-duration:11s;}
.s6{left:80%;animation-duration:8s;}
.s7{left:95%;animation-duration:10s;}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}
