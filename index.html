<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#cfefff,#eaf8ff,#ffffff);
overflow-x:hidden;
color:#234;
}

/* หิมะ */

.snow{
position:fixed;
top:-10%;
font-size:24px;
pointer-events:none;
animation:snowFall linear infinite;
opacity:.9;
}

.n1{left:5%;animation-duration:8s;}
.n2{left:15%;animation-duration:11s;}
.n3{left:28%;animation-duration:9s;}
.n4{left:40%;animation-duration:10s;}
.n5{left:55%;animation-duration:7s;}
.n6{left:68%;animation-duration:12s;}
.n7{left:82%;animation-duration:9s;}
.n8{left:95%;animation-duration:11s;}

@keyframes snowFall{

0%{
transform:translateY(-100px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:.4;
}

}

header{
background:rgba(255,255,255,.55);
backdrop-filter:blur(15px);
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

nav{
display:flex;
justify-content:center;
gap:35px;
}

nav a{
text-decoration:none;
color:#4a6fa5;
font-size:18px;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:#1f8fff;
}

.container{
max-width:900px;
margin:60px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.55);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.7);
border-radius:35px;
padding:45px;
text-align:center;
box-shadow:0 15px 35px rgba(100,150,255,.2);
}

.card img{
width:190px;
height:190px;
border-radius:50%;
object-fit:cover;
border:6px solid #bfe7ff;
}

.card h1{
margin-top:20px;
font-size:38px;
color:#2b79d8;
}

.card p{
margin-top:10px;
font-size:18px;
color:#567;
}

.contact{
margin-top:35px;
display:grid;
gap:20px;
}

.contact-item{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
transition:.3s;
font-size:18px;
}

.contact-item:hover{
transform:translateY(-5px);
}

.contact-item a{
text-decoration:none;
color:#1f8fff;
font-weight:bold;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
max-width:850px;
margin:45px auto;
padding:0 20px;
}

.menu-card{
background:linear-gradient(135deg,#8dd6ff,#d9f2ff);
padding:35px;
border-radius:25px;
text-align:center;
text-decoration:none;
color:#2c6cb5;
font-size:24px;
font-weight:bold;
transition:.3s;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.menu-card:hover{
transform:translateY(-8px);
background:linear-gradient(135deg,#6bc8ff,#bde8ff);
}

.menu-card span{
display:block;
font-size:45px;
margin-bottom:10px;
}

footer{
margin-top:40px;
background:#69b7ff;
color:white;
padding:18px;
text-align:center;
}

@media(max-width:768px){

.menu-grid{
grid-template-columns:1fr;
}

nav{
flex-wrap:wrap;
gap:18px;
}

}

</style>
</head>
